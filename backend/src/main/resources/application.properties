# ===========================================================================
#  Configuration du backend Quarkus
#  Les valeurs ${VAR:defaut} sont surchargées par les variables
#  d'environnement passées par docker-compose (sinon le défaut s'applique,
#  pratique pour lancer en local).
# ===========================================================================

# --- Base de données PostgreSQL ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:gs}
quarkus.datasource.password=${DB_PASSWORD:gs}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/gestionstockdb}

# Hibernate : met à jour le schéma automatiquement à partir des entités.
# "update" conserve les données entre les redémarrages (persistance réelle).
quarkus.hibernate-orm.database.generation=update

# --- CORS ---
# Indispensable : autorise le navigateur (Angular) à appeler cette API
# depuis une autre origine. Flutter mobile n'est pas concerné par le CORS.
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:8090,http://localhost:5000,http://localhost:5001}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,content-type,authorization

# --- Documentation API ---
# Expose Swagger UI même en mode packagé (production), pas seulement en dev.
quarkus.swagger-ui.always-include=true

# --- Serveur HTTP ---
quarkus.http.port=8080
# Écoute sur toutes les interfaces (nécessaire dans un conteneur Docker)
quarkus.http.host=0.0.0.0
