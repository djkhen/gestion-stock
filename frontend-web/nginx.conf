server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Application Angular : c'est une SPA, donc toutes les routes inconnues
    # renvoient index.html (sinon F5 sur une route donnerait un 404).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy : /api/... est transféré au backend Quarkus.
    # Le slash final après 8080 retire le préfixe /api/
    # (donc /api/produits -> http://backend:8080/produits).
    # "backend" est le nom du service défini dans docker-compose.yml.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
