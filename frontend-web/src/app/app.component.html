<div class="container">
  <h1>🛍️ Catalogue produits</h1>
  <p class="sous-titre">Angular ↔ API Quarkus ↔ PostgreSQL</p>

  <!-- Formulaire d'ajout -->
  <form class="form" (ngSubmit)="ajouter()">
    <input [(ngModel)]="nouveau.nom" name="nom" placeholder="Nom" required />
    <input [(ngModel)]="nouveau.description" name="description" placeholder="Description" />
    <input [(ngModel)]="nouveau.prix" name="prix" type="number" step="0.01" placeholder="Prix" />
    <button type="submit">Ajouter</button>
  </form>

  <!-- Messages d'état -->
  <p *ngIf="chargement" class="info">Chargement…</p>
  <p *ngIf="erreur" class="erreur">{{ erreur }}</p>

  <!-- Liste des produits -->
  <table *ngIf="produits.length > 0">
    <thead>
      <tr><th>Nom</th><th>Description</th><th>Prix</th><th></th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of produits">
        <td>{{ p.nom }}</td>
        <td>{{ p.description }}</td>
        <td>{{ p.prix | number:'1.2-2' }} €</td>
        <td><button class="suppr" (click)="supprimer(p.id)">🗑️</button></td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!chargement && produits.length === 0 && !erreur" class="info">
    Aucun produit pour le moment.
  </p>
</div>
